<style>
.chip {
display: inline-flex;
align-items: center;
background-color: #e0e0e0;
border-radius: 16px;
padding: 4px 8px;
margin: 4px;
}
.chip button {
background: none;
border: none;
cursor: pointer;
margin-left: 4px;
}
.chip button:hover {
color: red;
}
</style>
<div id="chip-container"></div>
<input name="tags" type="hidden" id="tags" value="<!--{echo $tags or $postinfo['tag']}-->">
<input id="keyword-input" size="30" placeholder="{lang input_a_new_tag_press_enter_submit}">
<div id="tagmore_menu" class="p_pop" style="display:none;" disautofocus="true"></div>
<script reload="1">
{
    const chipContainer = document.getElementById('chip-container');
    const keywords = $('tags').value ? $('tags').value.split(',') : [];
    let tagMenui = 0;
    let tagMenuLength = 0;
    let isTagMenuHovered = false;

    $('keyword-input').addEventListener('input', async function() {
        const query = this.value.trim();
        if (mb_strlen(query) < 2) {
            $('tagmore_menu').style.display = 'none';
            return;
        }

        try {
            const response = await fetch(`forum.php?mod=tag&op=search&inajax=1&searchkey=${encodeURIComponent(query)}`);
            const suggestions = await response.json();

            if (suggestions.length > 0) {
                let s = '<ul>';
                tagMenuLength = suggestions.length;
                tagMenui = -1; // Reset selection index
                suggestions.forEach((tag, i) => {
                    s += `<li><a href="javascript:;" id="tagmenu_item_${i}" onmouseover="tagMenuOp(5, ${i})">${tag}</a></li>`;
                });
                s += '</ul>';
                $('tagmore_menu').innerHTML = s;
                showMenu({'ctrlid':'keyword-input', 'menuid':'tagmore_menu', 'pos':'13!'});

                // Attach mousedown event to new items so we can process click before blur
                suggestions.forEach((tag, i) => {
                    const item = document.getElementById(`tagmenu_item_${i}`);
                    if (item) {
                        item.addEventListener('mousedown', function(e) {
                            addKeyword(tag);
                            $('keyword-input').value = '';
                            $('tagmore_menu').style.display = 'none';
                        });
                    }
                });
            } else {
                $('tagmore_menu').style.display = 'none';
            }
        } catch (error) {
            console.error('Error fetching tag suggestions:', error);
        }
    });

    window.tagMenuOp = function(op, index) {
        if (op === 5) {
            tagMenui = index;
            const as = $('tagmore_menu').getElementsByTagName('a');
            for (let i = 0; i < as.length; i++) {
                as[i].className = (i === index) ? 'a' : '';
            }
        }
    };

    $('tagmore_menu').addEventListener('mouseenter', function() {
        isTagMenuHovered = true;
    });

    $('tagmore_menu').addEventListener('mouseleave', function() {
        isTagMenuHovered = false;
    });


    function renderChips() {
        $('tags').value = keywords.join(',');
        chipContainer.innerHTML = '';
        keywords.forEach(keyword => {
            const chip = document.createElement('div');
            chip.className = 'chip';
            chip.textContent = keyword;

            const removeButton = document.createElement('button');
            removeButton.textContent = '×';
            removeButton.addEventListener('click', () => removeKeyword(keyword));

            chip.appendChild(removeButton);
            chipContainer.appendChild(chip);
        });
    }

    function addKeyword(value) {
        if (value.indexOf(',') !== -1 || value.indexOf('\\') !== -1) {
            showError('{lang tag_cannot_contain_comma_or_backslash}');
            return;
        }

        if(keywords.length >= 5) {
            showError('{lang tag_count_limit}');
            return;
        }

        const taglength = mb_strlen(value);

        if(taglength > 30 || taglength < 3) {
            showError('{lang tag_max_length_invalid}' + taglength);
            return;
        }

        if (value && !keywords.includes(value)) {
            keywords.push(value);
            renderChips();
        }
    }

    function removeKeyword(keyword) {
        const index = keywords.indexOf(keyword);
        if (index > -1) {
            keywords.splice(index, 1);
            renderChips();
        }
    }

    $('keyword-input').addEventListener('keydown', function(e) {
        if ($('tagmore_menu').style.display !== 'none' && tagMenuLength > 0) {
            if (e.keyCode === 40) { // Arrow Down
                tagMenui++;
                if (tagMenui >= tagMenuLength) tagMenui = 0;
                tagMenuOp(5, tagMenui);
                const selectedItem = document.getElementById(`tagmenu_item_${tagMenui}`);
                if (selectedItem) this.value = selectedItem.innerText;
                e.preventDefault();
                return;
            } else if (e.keyCode === 38) { // Arrow Up
                tagMenui--;
                if (tagMenui < 0) tagMenui = tagMenuLength - 1;
                tagMenuOp(5, tagMenui);
                const selectedItem = document.getElementById(`tagmenu_item_${tagMenui}`);
                if (selectedItem) this.value = selectedItem.innerText;
                e.preventDefault();
                return;
            } else if (e.keyCode === 13) { // Enter
                $('tagmore_menu').style.display = 'none';
            }
        }

        if (e.key === 'Enter') {
            addKeyword(this.value.trim());
            this.value = '';
            doane(e);
        }
    });

    $('keyword-input').addEventListener('blur', function() {
        if (isTagMenuHovered) return;
        if (this.value.trim()) {
            addKeyword(this.value.trim());
            this.value = '';
        }
        $('tagmore_menu').style.display = 'none';
    });

    renderChips();
}
</script>
