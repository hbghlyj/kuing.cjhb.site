name: Playwright Functional Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: 'yes'
        ports:
          - 3306:3306
        options: --health-cmd="healthcheck.sh --connect --innodb_initialized" --health-interval=5s --health-timeout=2s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli, mbstring, curl, xml, json
          tools: composer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Dependencies
        run: |
          composer install --no-dev --no-interaction --no-progress --prefer-dist --optimize-autoloader
          npm install playwright

      - name: Install Playwright Browsers
        run: npx playwright install chromium

      - name: Configure Database & DiscuzX
        run: |
          echo -e "[client]\nhost=127.0.0.1\nuser=root\npassword=" > ~/.my.cnf
          sudo cp ~/.my.cnf /root/.my.cnf
          sudo chmod 600 ~/.my.cnf /root/.my.cnf

          mysql -e "CREATE DATABASE ultrax;"
          mysql -e "CREATE USER IF NOT EXISTS 'discuz'@'%' IDENTIFIED BY 'password';"
          mysql -e "GRANT ALL PRIVILEGES ON ultrax.* TO 'discuz'@'%';"
          mysql -e "FLUSH PRIVILEGES;"

          sed '1d' install/sql/sql_install.php | mysql ultrax

          cp config/config_global_default.php config/config_global.php
          sed -i "s/\$_config\['db'\]\[1\]\['dbname'\]  		= 'mitframe';/\$_config['db'][1]['dbname'] = 'ultrax';/g" config/config_global.php
          sed -i "s/\$_config\['db'\]\[1\]\['dbuser'\]  		= 'root';/\$_config['db'][1]['dbuser'] = 'discuz';/g" config/config_global.php
          sed -i "s/\$_config\['db'\]\[1\]\['dbpw'\] 	 	= '';/\$_config['db'][1]['dbpw'] = 'password';/g" config/config_global.php
          sed -i "s/\$_config\['db'\]\[1\]\['dbhost'\]  		= 'localhost';/\$_config['db'][1]['dbhost'] = '127.0.0.1';/g" config/config_global.php

          mkdir -m 777 -p data/template/EN data/template/TC data/sysdata data/cache data/log data/diy data/avatar data/plugindata data/download data/addonmd5 data/threadcache data/attachment
          chmod -R 777 data config

          cp chat/php/config_default.php chat/php/config.php
          echo '<?php if (!class_exists("Pusher")) {     class Pusher {         public function __construct(...$args) {}         public function trigger($channel, $event, $data, $a = null, $b = null)         {             return true;         }     } } ?>'  > source/class/class_pusher.php
          DISCUZ_SEED_DATABASE=1 php tools/import_all_data.php
      - name: Start PHP Server
        run: php -S 127.0.0.1:8080 > php_server.log 2>&1 &

      - name: Run Playwright Tests
        run: |
          node tools/test_forum.js
          node tools/test_tags.js
          node tools/test_admin.js

      - name: Check PHP Server Errors
        if: always()
        run: |
          if grep -v 'mod=swfupload' php_server.log | grep -E '\[(4|5)[0-9]{2}\]:'; then
            echo "Found unexpected HTTP 4xx or 5xx errors in php_server.log:"
            grep -v 'mod=swfupload' php_server.log | grep -E '\[(4|5)[0-9]{2}\]:'
            exit 1
          else
            echo "No unexpected HTTP 4xx or 5xx errors found."
          fi

      - name: Upload Screenshots and Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: |
            functional_test_report.md
            browser_error.txt
            *.png
            php_server.log
            data/log/
          retention-days: 7
